<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hardy Henry — Portail Clients</title>
<style>
  :root {
    --bg:       #F7F5F0;
    --card:     #FFFFFF;
    --border:   #E5E2DA;
    --text-1:   #1A1714;
    --text-2:   #5C5751;
    --text-3:   #9C9890;
    --accent:   #1A56DB;
    --accent-l: #EBF0FC;
    --green:    #1A7F4B;
    --green-l:  #E8F5EE;
    --yellow:   #B45309;
    --yellow-l: #FEF3C7;
    --red:      #DC2626;
    --red-l:    #FEE2E2;
    --radius:   12px;
    --shadow:   0 1px 4px rgba(0,0,0,.08);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); font-family: 'Inter', system-ui, sans-serif; color: var(--text-1); min-height: 100vh; }

  /* ── Header ── */
  .portal-header {
    background: var(--card);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    height: 64px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .portal-logo {
    width: 36px; height: 36px;
    background: var(--accent);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-weight: 700; font-size: 16px;
    flex-shrink: 0;
  }
  .portal-title { font-size: 15px; font-weight: 600; }
  .portal-subtitle { font-size: 12px; color: var(--text-3); }

  /* ── Content ── */
  .portal-body { max-width: 760px; margin: 0 auto; padding: 28px 16px 80px; }

  /* ── Client card ── */
  .client-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px 24px;
    margin-bottom: 24px;
    box-shadow: var(--shadow);
  }
  .client-card-name { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
  .client-card-meta { font-size: 13px; color: var(--text-2); display: flex; flex-wrap: wrap; gap: 16px; }
  .client-card-meta span { display: flex; align-items: center; gap: 5px; }

  /* ── Section title ── */
  .section-title {
    font-size: 13px; font-weight: 600; color: var(--text-2);
    text-transform: uppercase; letter-spacing: .06em;
    margin-bottom: 14px;
  }

  /* ── Inspection block ── */
  .insp-block {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 20px;
    box-shadow: var(--shadow);
    overflow: hidden;
  }
  .insp-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
    cursor: pointer;
    user-select: none;
  }
  .insp-header:hover { background: #FAFAF8; }
  .insp-date { font-size: 14px; font-weight: 600; }
  .insp-status {
    font-size: 11px; font-weight: 600; padding: 3px 10px;
    border-radius: 20px; text-transform: uppercase; letter-spacing: .04em;
    flex-shrink: 0;
  }
  .insp-status.done { background: var(--green-l); color: var(--green); }
  .insp-status.draft { background: var(--yellow-l); color: var(--yellow); }
  .insp-chevron { font-size: 16px; color: var(--text-3); transition: transform .2s; flex-shrink: 0; }
  .insp-chevron.open { transform: rotate(180deg); }

  .insp-body { padding: 20px; display: none; }
  .insp-body.open { display: block; }

  .insp-notes {
    font-size: 13px; color: var(--text-2); line-height: 1.6;
    background: var(--bg); border-radius: 8px; padding: 12px 14px;
    margin-bottom: 16px;
    white-space: pre-wrap;
  }

  /* ── Photos ── */
  .photos-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 10px;
    margin-bottom: 16px;
  }
  .photo-card {
    border-radius: 8px; overflow: hidden;
    border: 1px solid var(--border);
    cursor: pointer;
  }
  .photo-card img { width: 100%; aspect-ratio: 4/3; object-fit: cover; display: block; }
  .photo-caption {
    font-size: 11px; color: var(--text-2);
    padding: 5px 8px;
    background: var(--card);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  /* ── Lightbox ── */
  .lightbox {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,.85);
    z-index: 999;
    align-items: center; justify-content: center;
    flex-direction: column;
    gap: 16px;
    padding: 20px;
  }
  .lightbox.open { display: flex; }
  .lightbox img { max-width: 100%; max-height: 75vh; border-radius: 8px; object-fit: contain; }
  .lightbox-close {
    position: absolute; top: 16px; right: 20px;
    color: #fff; font-size: 28px; cursor: pointer; line-height: 1;
  }
  .lightbox-caption { color: #ccc; font-size: 13px; text-align: center; }

  /* ── Feedback block ── */
  .feedback-block {
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px;
    background: var(--bg);
    margin-top: 4px;
  }
  .feedback-title { font-size: 13px; font-weight: 600; margin-bottom: 14px; color: var(--text-1); }
  .feedback-row { margin-bottom: 14px; }
  .feedback-label { font-size: 12px; color: var(--text-2); margin-bottom: 6px; font-weight: 500; }
  .stars { display: flex; gap: 6px; }
  .star {
    font-size: 26px; cursor: pointer; transition: transform .15s, opacity .15s;
    opacity: .3; user-select: none;
  }
  .star.active { opacity: 1; }
  .star:hover { transform: scale(1.15); }
  .feedback-textarea {
    width: 100%; border: 1px solid var(--border); border-radius: 8px;
    padding: 10px 12px; font-size: 13px; resize: vertical; min-height: 80px;
    font-family: inherit; background: var(--card); color: var(--text-1);
    outline: none; transition: border-color .2s;
  }
  .feedback-textarea:focus { border-color: var(--accent); }
  .feedback-submit {
    background: var(--accent); color: #fff;
    border: none; border-radius: 8px;
    padding: 10px 20px; font-size: 13px; font-weight: 600;
    cursor: pointer; transition: opacity .2s;
    margin-top: 4px;
  }
  .feedback-submit:hover { opacity: .88; }
  .feedback-submit:disabled { opacity: .5; cursor: default; }
  .feedback-saved {
    font-size: 12px; color: var(--green);
    margin-left: 10px; display: none;
  }
  .feedback-saved.show { display: inline; }

  /* ── Empty / Error ── */
  .portal-empty {
    text-align: center; padding: 80px 20px;
    color: var(--text-3);
  }
  .portal-empty .icon { font-size: 48px; margin-bottom: 12px; }
  .portal-empty h2 { font-size: 18px; color: var(--text-2); margin-bottom: 6px; }

  /* ── Loading ── */
  .portal-loading {
    display: flex; align-items: center; justify-content: center;
    min-height: 60vh;
    flex-direction: column; gap: 12px; color: var(--text-3);
  }
  .spinner {
    width: 32px; height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Divider ── */
  .divider { border: none; border-top: 1px solid var(--border); margin: 16px 0; }
</style>
</head>
<body>

<header class="portal-header">
  <div class="portal-logo">HH</div>
  <div>
    <div class="portal-title">Hardy Henry Services</div>
    <div class="portal-subtitle">Portail Clients</div>
  </div>
</header>

<main class="portal-body" id="app">
  <div class="portal-loading">
    <div class="spinner"></div>
    <span>Chargement…</span>
  </div>
</main>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <span class="lightbox-close" onclick="closeLightbox()">✕</span>
  <img id="lightbox-img" src="" alt="">
  <div class="lightbox-caption" id="lightbox-caption"></div>
</div>

<script>
const token = location.pathname.split('/client/')[1];
let clientId = null;

/* ── Stars helper ── */
function renderStars(containerId, field, currentVal, inspId) {
  const container = document.getElementById(containerId);
  if (!container) return;
  container.innerHTML = '';
  for (let i = 1; i <= 3; i++) {
    const s = document.createElement('span');
    s.className = 'star' + (i <= currentVal ? ' active' : '');
    s.textContent = '⭐';
    s.dataset.val = i;
    s.onclick = () => {
      // Toggle : si on reclique la même étoile, on remet à 0
      const prev = parseInt(container.dataset.val || '0');
      const newVal = i === prev ? 0 : i;
      container.dataset.val = newVal;
      Array.from(container.children).forEach((el, idx) => {
        el.classList.toggle('active', idx < newVal);
      });
    };
    container.appendChild(s);
  }
  container.dataset.val = currentVal || 0;
}

function getStarVal(containerId) {
  const el = document.getElementById(containerId);
  return parseInt(el?.dataset.val || '0') || null;
}

/* ── Lightbox ── */
function openLightbox(url, caption) {
  document.getElementById('lightbox-img').src = url;
  document.getElementById('lightbox-caption').textContent = caption || '';
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
}

/* ── Toggle inspection body ── */
function toggleInsp(id) {
  const body = document.getElementById('insp-body-' + id);
  const chev = document.getElementById('insp-chev-' + id);
  body.classList.toggle('open');
  chev.classList.toggle('open');
}

/* ── Format date ── */
function fmtDate(d) {
  if (!d) return '—';
  return new Date(d).toLocaleDateString('fr-FR', { day: '2-digit', month: 'long', year: 'numeric' });
}

/* ── Save feedback ── */
async function saveFeedback(inspId) {
  const btn = document.getElementById('fb-btn-' + inspId);
  const saved = document.getElementById('fb-saved-' + inspId);
  const comment = document.getElementById('fb-comment-' + inspId)?.value || '';
  const rating  = getStarVal('fb-rating-' + inspId);
  const propre  = getStarVal('fb-propre-' + inspId);
  const ponctuel = getStarVal('fb-ponctuel-' + inspId);
  const efficace = getStarVal('fb-efficace-' + inspId);

  btn.disabled = true;
  btn.textContent = 'Sauvegarde…';
  try {
    const r = await fetch('/api/portal/feedback/' + inspId, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ client_id: clientId, rating, propre, ponctuel, efficace, comment })
    });
    if (!r.ok) throw new Error('Erreur réseau');
    saved.classList.add('show');
    setTimeout(() => saved.classList.remove('show'), 3000);
  } catch(e) {
    alert('Erreur lors de la sauvegarde. Réessayez.');
  }
  btn.disabled = false;
  btn.textContent = 'Sauvegarder';
}

/* ── Render ── */
function renderPortal(data) {
  clientId = data.client.id;
  const c = data.client;
  const inspections = data.inspections;

  let html = '';

  // Client card
  html += `<div class="client-card">
    <div class="client-card-name">${esc(c.name)}</div>
    <div class="client-card-meta">
      ${c.type ? `<span>🏢 ${esc(c.type)}</span>` : ''}
      ${c.phone ? `<span>📞 ${esc(c.phone)}</span>` : ''}
      ${c.email ? `<span>✉️ ${esc(c.email)}</span>` : ''}
    </div>
    ${c.notes ? `<div style="margin-top:10px;font-size:13px;color:var(--text-2)">${esc(c.notes)}</div>` : ''}
  </div>`;

  if (!inspections.length) {
    html += `<div class="portal-empty">
      <div class="icon">📋</div>
      <h2>Aucune inspection disponible</h2>
      <p>Vos rapports d'inspection apparaîtront ici.</p>
    </div>`;
    document.getElementById('app').innerHTML = html;
    return;
  }

  html += `<div class="section-title">📋 Rapports d'inspection (${inspections.length})</div>`;

  inspections.forEach((insp, idx) => {
    const fb = insp.feedback;
    const statusLabel = insp.status === 'done' ? 'Terminée' : 'En cours';
    const statusClass = insp.status === 'done' ? 'done' : 'draft';

    html += `<div class="insp-block">
      <div class="insp-header" onclick="toggleInsp('${insp.id}')">
        <div>
          <div class="insp-date">${fmtDate(insp.date)}</div>
        </div>
        <div style="display:flex;align-items:center;gap:10px">
          <span class="insp-status ${statusClass}">${statusLabel}</span>
          <span class="insp-chevron${idx === 0 ? ' open' : ''}" id="insp-chev-${insp.id}">▾</span>
        </div>
      </div>
      <div class="insp-body${idx === 0 ? ' open' : ''}" id="insp-body-${insp.id}">`;

    // Notes inspection
    if (insp.inspNotes) {
      html += `<div class="insp-notes">${esc(insp.inspNotes)}</div>`;
    }
    if (insp.notes && insp.notes !== insp.inspNotes) {
      html += `<div style="font-size:13px;color:var(--text-2);margin-bottom:14px">${esc(insp.notes)}</div>`;
    }

    // Photos
    if (insp.photos?.length) {
      html += `<div class="photos-grid">`;
      insp.photos.forEach(p => {
        const caption = [p.lieu, p.probleme].filter(Boolean).join(' · ');
        html += `<div class="photo-card" onclick="openLightbox('${p.image || ''}','${esc(caption)}')">
          <img src="${p.image || ''}" alt="${esc(caption)}" loading="lazy">
          ${caption ? `<div class="photo-caption">${esc(caption)}</div>` : ''}
        </div>`;
      });
      html += `</div>`;
    }

    html += `<hr class="divider">`;

    // Feedback
    html += `<div class="feedback-block">
      <div class="feedback-title">💬 Votre avis sur cette inspection</div>

      <div class="feedback-row">
        <div class="feedback-label">Note globale</div>
        <div class="stars" id="fb-rating-${insp.id}"></div>
      </div>
      <div class="feedback-row">
        <div class="feedback-label">Propreté</div>
        <div class="stars" id="fb-propre-${insp.id}"></div>
      </div>
      <div class="feedback-row">
        <div class="feedback-label">Ponctualité</div>
        <div class="stars" id="fb-ponctuel-${insp.id}"></div>
      </div>
      <div class="feedback-row">
        <div class="feedback-label">Efficacité</div>
        <div class="stars" id="fb-efficace-${insp.id}"></div>
      </div>
      <div class="feedback-row">
        <div class="feedback-label">Commentaire</div>
        <textarea class="feedback-textarea" id="fb-comment-${insp.id}" placeholder="Vos remarques…">${fb?.comment || ''}</textarea>
      </div>
      <button class="feedback-submit" id="fb-btn-${insp.id}" onclick="saveFeedback('${insp.id}')">
        ${fb ? 'Mettre à jour' : 'Envoyer mon avis'}
      </button>
      <span class="feedback-saved" id="fb-saved-${insp.id}">✓ Sauvegardé</span>
    </div>`;

    html += `</div></div>`;

    // Init stars après injection DOM (on stocke pour plus tard)
    window._pendingStars = window._pendingStars || [];
    window._pendingStars.push({
      insp, fb,
      fields: ['rating','propre','ponctuel','efficace']
    });
  });

  document.getElementById('app').innerHTML = html;

  // Init toutes les étoiles
  (window._pendingStars || []).forEach(({ insp, fb, fields }) => {
    fields.forEach(f => {
      renderStars('fb-' + f + '-' + insp.id, f, fb?.[f] || 0, insp.id);
    });
  });
  window._pendingStars = [];
}

/* ── Escape ── */
function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ── Load ── */
async function load() {
  if (!token) {
    document.getElementById('app').innerHTML = `<div class="portal-empty">
      <div class="icon">🔒</div><h2>Lien invalide</h2><p>Ce lien n'est pas valide.</p>
    </div>`;
    return;
  }
  try {
    const r = await fetch('/api/portal/client/' + token);
    if (!r.ok) {
      const err = await r.json();
      document.getElementById('app').innerHTML = `<div class="portal-empty">
        <div class="icon">🔒</div><h2>${err.error || 'Lien invalide'}</h2>
        <p>Ce lien est invalide ou a expiré.</p>
      </div>`;
      return;
    }
    const data = await r.json();
    renderPortal(data);
  } catch(e) {
    document.getElementById('app').innerHTML = `<div class="portal-empty">
      <div class="icon">⚠️</div><h2>Erreur de connexion</h2><p>Réessayez dans quelques instants.</p>
    </div>`;
  }
}

load();
</script>
</body>
</html>
